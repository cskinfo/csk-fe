name: Build and Push to Azure ACR

on:
  # Trigger on both main and dev branches
  push:
    branches: 
      - master
      - Development

  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to deploy to'
        type: environment
        required: true
        default: 'development'

permissions:
  contents: read
  id-token: write  

jobs:
  build:
    runs-on: ubuntu-latest
    # Dynamically set the environment:
    # If triggered manually, use the input. If push to main, use 'prod'. Otherwise, use 'development'.
    environment: ${{ github.event.inputs.target_env || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    # We define the frontend name here since it stays the same across environments
    env:
      ACR_CSK_FRONTEND: csk-frontend
      # Extract the environment name to use in our Docker tags (e.g., 'dev' or 'prod')
      ENV_TAG: ${{ github.event.inputs.target_env || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          # These now pull from the specific GitHub Environment you mapped to above
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: login to ACR
        # Reads the ACR_NAME from your GitHub Environment Variables
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Calculate Short SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build, tag, and push images to AZURE ACR (FRONTEND)
        run: |
          # Build the image using the registry URL from your GitHub Environment Variables
          docker build -t ${{ vars.ACR_REGISTRY }}/${{ env.ACR_CSK_FRONTEND }}:${{ steps.vars.outputs.sha_short }} -f Dockerfile .

          # Tag it with the environment specific "latest" tag (e.g., dev-latest or prod-latest)
          docker tag ${{ vars.ACR_REGISTRY }}/${{ env.ACR_CSK_FRONTEND }}:${{ steps.vars.outputs.sha_short }} ${{ vars.ACR_REGISTRY }}/${{ env.ACR_CSK_FRONTEND }}:${{ env.ENV_TAG }}-latest

          # Push both tags to ACR
          docker push ${{ vars.ACR_REGISTRY }}/${{ env.ACR_CSK_FRONTEND }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ vars.ACR_REGISTRY }}/${{ env.ACR_CSK_FRONTEND }}:${{ env.ENV_TAG }}-latest
