server {
    listen 80;

    # Frontend Static Files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to Auth Backend
    location /api/ {
        # Using the container name defined in your Docker network/Ansible
        proxy_pass http://csk-backend:5004;
       
        # Standard proxy headers for preserving client info
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
       
        # Optional: Add these to ensure the backend gets the real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security: Deny access to .env files (Fixes the leak we saw in your logs!)
    location ~ /\.(env|git|ht) {
        deny all;
    }
}
