server {
    listen 80;

    # Assets & Images - direct serve karo (React app open NAHI hogi)
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend Static Files - React Router
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to Auth Backend
    location /api/ {
        proxy_pass http://csk-backend:5004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security: Deny access to .env files
    location ~ /\.(env|git|ht) {
        deny all;
    }
}